name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          # Public by design — the RSVP endpoint URL ships in the browser bundle.
          # A GitHub secret would add no protection, so it lives here directly.
          # To rotate: update this value (and re-deploy the Apps Script keeps the
          # same /exec URL as long as you use "Manage deployments > New version").
          VITE_RSVP_ENDPOINT: ${{ secrets.VITE_RSVP_ENDPOINT || 'https://script.google.com/macros/s/AKfycbwq_zRZLlCEs2jlSMlIVOCuhnlGoZA5nJ3oIKTuGWI-Y6_pSASwuTvs20Zg5WQ9xRcK/exec' }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
